# theme
include themes/mocha.conf

# BEGIN_KITTY_FONTS
font_family      family='JetBrainsMono Nerd Font' postscript_name=JetBrainsMonoNF-Regular
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
font_size        12.0

confirm_os_window_close 0

# Change zoom
map alt+equal        change_font_size all +2.0
map alt+minus       change_font_size all -2.0
map alt+backspace   change_font_size all 0

# Unmap
map ctrl+shift+plus  no_op
map ctrl+shift+minus no_op
